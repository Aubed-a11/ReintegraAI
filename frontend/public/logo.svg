<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Fond bleu marine arrondi -->
  <rect width="48" height="48" rx="11" fill="#0d1e3c"/>

  <!-- Halo lumineux derrière le sommet -->
  <circle cx="24" cy="18" r="8" fill="#3a7bd5" opacity="0.18"/>
  <circle cx="24" cy="18" r="5.5" fill="#3a7bd5" opacity="0.15"/>

  <!-- Arc horizon -->
  <path d="M 6 38 Q 24 10 42 38" stroke="#3a7bd5" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Rayons solaires -->
  <line x1="24" y1="11" x2="24" y2="7.5"  stroke="#6aaee8" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="29.5" y1="12.5" x2="31.8" y2="10.2" stroke="#6aaee8" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="18.5" y1="12.5" x2="16.2" y2="10.2" stroke="#6aaee8" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="32" y1="18" x2="35.5" y2="18" stroke="#6aaee8" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="16" y1="18" x2="12.5" y2="18" stroke="#6aaee8" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Cercle blanc au sommet de l'arc -->
  <circle cx="24" cy="18" r="4"   fill="white"/>
  <circle cx="24" cy="18" r="2.4" fill="#0d1e3c"/>
  <circle cx="24" cy="18" r="1.4" fill="white"/>

  <!-- Ligne de sol -->
  <line x1="6"  y1="38" x2="42" y2="38" stroke="#2d5fa8" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>

  <!-- Noeuds connectés sur la ligne de sol -->
  <circle cx="6"  cy="38" r="2.2" fill="#2d5fa8" opacity="0.8"/>
  <circle cx="24" cy="38" r="2.2" fill="#2d5fa8" opacity="0.8"/>
  <circle cx="42" cy="38" r="2.2" fill="#2d5fa8" opacity="0.8"/>
</svg>
